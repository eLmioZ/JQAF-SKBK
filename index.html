        async function fetchAnalisisSheetData(category, fasa, url) {
            if (!url) return;
            try {
                const match = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
                if (!match) return;
                const sheetId = match[1];
                
                const gidMatch = url.match(/gid=([0-9]+)/);
                const gidParam = gidMatch ? `&gid=${gidMatch[1]}` : '';
                
                const fetchUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&headers=1${gidParam}`;
                const res = await fetch(fetchUrl);
                const text = await res.text();
                
                const jsonStr = text.substring(47, text.length - 2);
                const json = JSON.parse(jsonStr);


                const headers = [];
                if (json.table.cols) {
                    json.table.cols.forEach(col => {
                        headers.push(col.label || '');
                    });
                }


                const rows = [];
                if (json.table.rows) {
                    json.table.rows.forEach(row => {
                        const rowData = [];
                        if (row.c) {
                            row.c.forEach(cell => {
                                rowData.push(cell ? (cell.f || cell.v || '') : '');
                            });
                        }
                        if (rowData.some(val => val !== '')) {
                            rows.push(rowData);
                        }
                    });
                }


                if (!analisisData[category]) {
                    analisisData[category] = {};
                }
                analisisData[category][fasa] = { headers, rows };


                if (currentView.toLowerCase() === category.toLowerCase()) {
                    renderMainView();
                }
            } catch (e) {
                console.error(`Gagal memproses Google Sheet ${category} - ${fasa}:`, e);
            }
        }


        // Fungsi Tarik Data status kelas perekodan (Utama)
        async function fetchSheetData(url) {
            try {
                const match = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
                if(!match) return;
                const sheetId = match[1];
                const fetchUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&headers=0`;
                const res = await fetch(fetchUrl);
                const text = await res.text();
                const jsonStr = text.substring(47, text.length - 2);
                const json = JSON.parse(jsonStr);


                classes = [];
                const dataRows = json.table.rows.slice(2);


                dataRows.forEach(row => {
                    if(row.c && row.c[0] && row.c[0].v) {
                        const name = row.c[0].v.toString().trim();
                        if(name === '') return; 
                        
                        let actionRaw = (row.c[1] && row.c[1].v) ? row.c[1].v.toString().trim().toUpperCase() : 'X';
                        
                        let action = 'BELUM ADA TINDAKAN';
                        if (actionRaw === 'O') action = 'SEDANG DITAKSIR';
                        else if (actionRaw === 'Y') action = 'TELAH DITAKSIR'; 
                        
                        classes.push({ name, action });
                    }
                });
                
                classes.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true, sensitivity: 'base'}));
                if(currentView === 'Utama') renderMainView();
                
            } catch(e) {
                console.error("Ralat memuat turun dari Google Sheet:", e);
            }
        }

        // Isikan Data Google Sheet URL Analisis ke Input Form
        function fillAnalisisInputs() {
            ['tasmik', 'jawi', 'solat'].forEach(cat => {
                ['fasa1', 'fasa2', 'fasa3'].forEach(fasa => {
                    const id = `url${cat.charAt(0).toUpperCase() + cat.slice(1)}${fasa.charAt(0).toUpperCase() + fasa.slice(1)}`;
                    const el = document.getElementById(id);
                    if (el) {
                        el.value = configAnalisis[cat]?.[fasa] || '';
                    }
                });
            });
        }


        // Simpan URL Google Sheet Analisis ke Firebase
        async function saveAnalisisUrl(category, fasa) {
            const id = `url${category.charAt(0).toUpperCase() + category.slice(1)}${fasa.charAt(0).toUpperCase() + fasa.slice(1)}`;
            const inputVal = document.getElementById(id).value.trim();
            
            if (!configAnalisis[category]) configAnalisis[category] = {};
            configAnalisis[category][fasa] = inputVal;


            try {
                await getCollectionRef('config').doc('analisisJqaf').set(configAnalisis, { merge: true });
                const btn = document.querySelector(`button[onclick="saveAnalisisUrl('${category}', '${fasa}')"]`);
                if (btn) {
                    const originalText = btn.innerText;
                    btn.innerText = "Berjaya!";
                    btn.classList.add("bg-emerald-500");
                    setTimeout(() => {
                        btn.innerText = originalText;
                        btn.classList.remove("bg-emerald-500");
                    }, 2000);
                }
            } catch (err) {
                console.error("Gagal menyimpan pautan URL analisis:", err);
            }
        }


        // Simpan Hebahan ke Firestore
        async function saveHebahan() {
            const input = document.getElementById('hebahanInput');
            const val = input.value.trim();
            if (!val) return;
            try {
                if (editingHebahanId) {
                    await getCollectionRef('hebahanList').doc(editingHebahanId).update({ teks: val });
                    editingHebahanId = null;
                } else {
                    await getCollectionRef('hebahanList').add({
                        teks: val,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                input.value = '';
                renderAdminDashboard();
            } catch (err) {
                console.error("Ralat simpan hebahan:", err);
            }
        }

        // Fungsi Padam Entry di Panel Pentadbir
        async function deleteEntry(type, index) {
            let docId = '';
            let collectionName = '';


            if(type === 'classes') {
                docId = classes[index].id;
                collectionName = 'classes';
            } else if(type === 'statusData') {
                docId = statusKelasData[index].id;
                collectionName = 'statusKelasData';
            } else if(type === 'hebahanList') {
                docId = hebahanList[index].id;
                collectionName = 'hebahanList';
            } else if(type === 'tahun6') {
                docId = dataFokusTahun6[index].id;
                collectionName = 'dataFokusTahun6';
            } else if(type === 'pelaporan') {
                docId = pelaporanLinks[index].id;
                collectionName = 'pelaporanLinks';
            }


            if(docId && collectionName) {
                try {
                    await getCollectionRef(collectionName).doc(docId).delete();
                    renderAdminDashboard();
                } catch (err) {
                    console.error("Gagal memadam data:", err);
                }
            }
        }


        function renderAnalisisTable(category, fasa, title) {
            // Tetapan Tema Warna Dinamik mengikut Fasa
            let accentColor = 'border-indigo-500';
            let bgHeader = 'bg-indigo-50';
            let textHeader = 'text-indigo-800';
            let badgeBg = 'bg-indigo-100';
            
            if (title.includes('FASA 1')) {
                accentColor = 'border-blue-500'; bgHeader = 'bg-blue-50/80'; textHeader = 'text-blue-900'; badgeBg = 'bg-blue-100';
            } else if (title.includes('FASA 2')) {
                accentColor = 'border-amber-500'; bgHeader = 'bg-amber-50/80'; textHeader = 'text-amber-900'; badgeBg = 'bg-amber-100';
            } else if (title.includes('FASA 3')) {
                accentColor = 'border-emerald-500'; bgHeader = 'bg-emerald-50/80'; textHeader = 'text-emerald-900'; badgeBg = 'bg-emerald-100';
            }


            const data = analisisData[category]?.[fasa];
            if (!data) {
                return `
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 border-t-4 ${accentColor} overflow-hidden">
                    <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50/30">

                        <span class="px-3 py-1 text-[10px] font-bold rounded-full ${badgeBg} ${textHeader} uppercase">${category}</span>
                    </div>
                    <div class="p-8 text-center flex flex-col items-center justify-center">
                        <svg class="w-12 h-12 text-slate-200 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        <p class="text-slate-400 text-sm font-medium">Menunggu muat turun data Google Sheet...</p>
                        <p class="text-slate-400 text-xs mt-1">Sila pastikan pautan URL betul dan diset kepada "Anyone with the link can view".</p>
                    </div>
                </div>`;
            }


            const headers = data.headers;
            const rows = data.rows;


            if (rows.length === 0) {
                return `
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 border-t-4 ${accentColor} overflow-hidden">
                    <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50/30">
                        <h3 class="text-sm font-black text-slate-800 uppercase tracking-widest">${title}</h3>
                        <span class="px-3 py-1 text-[10px] font-bold rounded-full ${badgeBg} ${textHeader} uppercase">${category}</span>
                    </div>
                    <div class="p-8 text-center">
                        <p class="text-slate-400 text-sm italic font-medium">Tiada rekod data dijumpai di dalam helaian Google Sheet.</p>
                    </div>
                </div>`;
            }


            let headerHtml = '';
            headers.forEach(h => {
                headerHtml += `<th class="p-4 text-left font-bold text-xs uppercase tracking-wider ${textHeader} ${bgHeader} border-b-2 border-slate-200 whitespace-nowrap">${h}</th>`;
            });


            let rowsHtml = '';
            rows.forEach((row, rowIndex) => {
                const rowBg = rowIndex % 2 === 0 ? 'bg-white' : 'bg-slate-50/40';
                rowsHtml += `<tr class="${rowBg} hover:bg-slate-100 transition duration-200 border-b border-slate-100 last:border-0 group">`;
                row.forEach((cell, cellIndex) => {
                    const isFirstCell = cellIndex === 0;
                    rowsHtml += `<td class="p-4 text-sm ${isFirstCell ? 'font-semibold text-slate-700' : 'text-slate-600'} whitespace-nowrap">${cell}</td>`;
                });
                rowsHtml += `</tr>`;
            });


            return `
            <div class="bg-white rounded-2xl shadow-md hover:shadow-lg transition-shadow duration-300 border border-slate-200 overflow-hidden border-t-4 ${accentColor}">
                <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50/30">
                    <h3 class="text-sm font-black text-slate-800 uppercase tracking-widest">${title}</h3>
                    <span class="px-3 py-1 text-[10px] font-bold rounded-full ${badgeBg} ${textHeader} uppercase">${category}</span>
                </div>
                <div class="overflow-x-auto custom-scrollbar">
                    <table class="w-full text-sm text-left border-collapse">
                        <thead>
                            <tr>${headerHtml}</tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100">
                            ${rowsHtml}
                        </tbody>
                    </table>
                </div>
            </div>`;
        }

                            <span class="mt-1.5 w-2 h-2 rounded-full bg-indigo-500 shrink-0"></span>
                            <p class="text-indigo-900 font-medium text-sm leading-relaxed">${h.teks}</p>
                        </div>
                    `).join('')
                    : '<p class="text-slate-400 text-sm italic">Tiada hebahan terkini.</p>';
            } else {
                hebahanSection.classList.add('hidden');
            }


            const container = document.getElementById('list-container');
            const mainTitle = document.getElementById('main-title');
            container.innerHTML = '';
           
            if (currentView === 'Utama') {
                mainTitle.innerText = `STATUS PEREKODAN JQAF - ${configPengurusan.fasa || 'FASA 1'}`;
                
                let belumCount = 0, sedangCount = 0, telahCount = 0;
                classes.forEach(c => {
                    if (c.action === 'BELUM ADA TINDAKAN') belumCount++;
                    else if (c.action === 'SEDANG DITAKSIR') sedangCount++;
                    else if (c.action === 'TELAH DITAKSIR' || c.action === 'TELAH DIHANTAR') telahCount++;
                });


                container.className = "grid grid-cols-1 md:grid-cols-3 gap-6";
                container.innerHTML = `
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 border-l-4 border-l-red-500">
                        <p class="text-xs font-black text-slate-400 uppercase tracking-widest mb-1">Belum Ada Tindakan</p>
                        <h3 class="text-4xl font-black text-red-600">${belumCount}</h3>
                        <p class="text-xs text-slate-500 mt-2">Kelas belum diproses</p>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 border-l-4 border-l-amber-500">
                        <p class="text-xs font-black text-slate-400 uppercase tracking-widest mb-1">Sedang Ditaksir</p>
                        <h3 class="text-4xl font-black text-amber-600">${sedangCount}</h3>
                        <p class="text-xs text-slate-500 mt-2">Dalam proses penilaian</p>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 border-l-4 border-l-emerald-500">
                        <p class="text-xs font-black text-slate-400 uppercase tracking-widest mb-1">Telah Ditaksir</p>
                        <h3 class="text-4xl font-black text-emerald-600">${telahCount}</h3>
                        <p class="text-xs text-slate-500 mt-2">Selesai sepenuhnya</p>
                    </div>
                `;
            } else if (currentView === 'Pelaporan') {
                mainTitle.innerText = "PELAPORAN KESELURUHAN";
                container.className = "flex flex-col gap-6";
                container.innerHTML = `
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                        <div class="flex flex-wrap gap-4 items-end">
                            <div class="flex flex-col gap-1">
                                <label class="text-xs font-bold text-slate-500">TAHUN</label>
                                <select id="searchTahun" class="p-2 border rounded-lg bg-slate-50">
                                    <option value="2025">2025</option>
                                    <option value="2026">2026</option>
                                    <option value="2027">2027</option>
                                </select>
                            </div>
                            <div class="flex flex-col gap-1">
                                <label class="text-xs font-bold text-slate-500">PEREKODAN</label>
                                <select id="searchFasa" class="p-2 border rounded-lg bg-slate-50">
                                    <option value="FASA 1">FASA 1</option>
                                    <option value="FASA 2">FASA 2</option>
                                    <option value="FASA 3">FASA 3</option>
                                </select>
                            </div>
                            <button onclick="searchPdfLink()" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-indigo-700">SUBMIT</button>
                        </div>
                        <div id="searchResult" class="mt-6"></div>
                    </div>
                `;
            } else if (currentView === 'Tahun6') {
                mainTitle.innerText = "DATA FOKUS TAHUN 6";
                container.className = "flex flex-col gap-8";
                
                // Helper untuk format jadual
                const renderTable = (fasa, kategori, title, rows) => {
                    const d = dataFokusTahun6.find(x => x.kategori === kategori && x.fasa === fasa) || {};
                    return `
                    <div class="flex-1 bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                        <h4 class="font-bold text-center text-sm text-indigo-800 bg-indigo-50 py-2 rounded mb-3">${fasa}</h4>
                        <table class="w-full text-xs text-left">
                            <tbody class="divide-y divide-slate-100">
                                <tr><td class="py-2 font-semibold">Jumlah Murid</td><td class="py-2 text-right font-bold">${d.jumlahMurid || '-'}</td></tr>
                                ${rows.map(r => `<tr><td class="py-2">${r.label}</td><td class="py-2 text-right font-bold text-blue-600">${d[r.key] || '-'} ${r.isPct?'%':''}</td></tr>`).join('')}
                            </tbody>
                        </table>
                    </div>`;
                };


                const tasmikRows = [
                    {label: 'Bil. Khatam', key: 'bilKhatam'}, {label: 'Peratus Khatam', key: 'peratusKhatam', isPct: true},
                    {label: 'Bil. Alquran', key: 'bilAlquran'}, {label: 'Peratus Alquran', key: 'peratusAlquran', isPct: true},
                    {label: 'Bil. Iqra', key: 'bilIqra'}, {label: 'Peratus Celik Iqra', key: 'peratusCelikIqra', isPct: true},
                    {label: 'Bil. Lemah Iqra', key: 'bilLemahIqra'}, {label: 'Peratus Lemah Iqra', key: 'peratusLemahIqra', isPct: true}
                ];
                const jawiRows = [
                    {label: 'Bilangan TP 6', key: 'tp6'}, {label: 'Bilangan TP 5', key: 'tp5'}, {label: 'Bilangan TP 4', key: 'tp4'},
                    {label: 'Bilangan TP 3', key: 'tp3'}, {label: 'Bilangan TP 2', key: 'tp2'}, {label: 'Bilangan TP 1', key: 'tp1'},
                    {label: 'Peratus TP 4,5 & 6', key: 'peratus456', isPct: true}, {label: 'Peratus TP 3', key: 'peratus3', isPct: true}, {label: 'Peratus TP 1 & 2', key: 'peratus12', isPct: true}
                ];
                const solatRows = [
                    {label: 'Peratus Perlakuan', key: 'peratusPerlakuan', isPct: true},
                    {label: 'Peratus Bacaan', key: 'peratusBacaan', isPct: true},
                    {label: 'Peratus Wudhu', key: 'peratusWudhu', isPct: true}
                ];


                container.innerHTML = `
                    <!-- 1. TASMIK (3 FASA BERSEBELAHAN) -->
                    <div class="border-t-4 border-blue-500 bg-white p-6 rounded-xl shadow-md">
                        <h3 class="font-black text-blue-900 mb-4 tracking-wider uppercase text-center border-b pb-3">1. ALQURAN</h3>
                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
                            ${renderTable('FASA 1', 'tasmik', 'ALQURAN', tasmikRows)}
                            ${renderTable('FASA 2', 'tasmik', 'ALQURAN', tasmikRows)}
                            ${renderTable('FASA 3', 'tasmik', 'ALQURAN', tasmikRows)}
                        </div>
                    </div>
                    <!-- 2. JAWI (3 FASA BERSEBELAHAN) -->
                    <div class="border-t-4 border-amber-500 bg-white p-6 rounded-xl shadow-md">
                        <h3 class="font-black text-amber-900 mb-4 tracking-wider uppercase text-center border-b pb-3">2. JAWI</h3>
                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
                            ${renderTable('FASA 1', 'jawi', 'JAWI', jawiRows)}
                            ${renderTable('FASA 2', 'jawi', 'JAWI', jawiRows)}
                            ${renderTable('FASA 3', 'jawi', 'JAWI', jawiRows)}
                        </div>
                    </div>
                    <!-- 3. SOLAT (3 FASA BERSEBELAHAN) -->
                    <div class="border-t-4 border-emerald-500 bg-white p-6 rounded-xl shadow-md">
                        <h3 class="font-black text-emerald-900 mb-4 tracking-wider uppercase text-center border-b pb-3">3. SOLAT</h3>
                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
                            ${renderTable('FASA 1', 'solat', 'SOLAT', solatRows)}
                            ${renderTable('FASA 2', 'solat', 'SOLAT', solatRows)}
                            ${renderTable('FASA 3', 'solat', 'SOLAT', solatRows)}
                        </div>
                    </div>
                `;
            } else {
                // Menjana Paparan Jadual Dinamik bagi Analisis Tasmik, Jawi, & Solat
                const category = currentView.toLowerCase(); // 'tasmik', 'jawi', 'solat'
                mainTitle.innerText = currentView === 'Tasmik' ? "DATA ALQURAN" : (currentView === 'Jawi' ? "DATA JAWI" : "DATA SOLAT");
                container.className = "flex flex-col gap-6";
                
                container.innerHTML = `
                    ${renderAnalisisTable(category, 'fasa1', 'FASA 1 (ATAS)')}
                    ${renderAnalisisTable(category, 'fasa2', 'FASA 2 (TENGAH)')}
                    ${renderAnalisisTable(category, 'fasa3', 'FASA 3 (BAWAH)')}
                `;
            }
        }
        function searchPdfLink() {
            const tahun = document.getElementById('searchTahun').value;
            const fasa = document.getElementById('searchFasa').value;
            const resultDiv = document.getElementById('searchResult');
            
            const found = pelaporanLinks.find(p => p.tahun === tahun && p.label === fasa);
            
            if (found) {
                resultDiv.innerHTML = `
                    <div class="bg-emerald-50 border border-emerald-200 p-6 rounded-xl text-center">
                        <p class="text-emerald-800 font-bold mb-2">Data Ditemui untuk ${tahun} - ${fasa}</p>
                        <a href="${found.url}" target="_blank" class="text-blue-600 font-bold underline text-lg">KLIK UNTUK BUKA DOKUMEN PDF/SHEET</a>
                    </div>
                `;
            } else {
                resultDiv.innerHTML = `<p class="text-red-500 font-bold">Tiada data dijumpai bagi pilihan tersebut.</p>`;
            }
        }
        // Mulakan inisialisasi aplikasi
        window.onload = function() {
            initAuthAndData();
        };
    </script>
</body>
</html>
