    <script>

        let classes = [];
        let statusKelasData = [];
        let hebahanList = [];
        let dataFokusTahun6 = [];
        let pelaporanLinks = [];
        let configPengurusan = { fasa: 'FASA 1', url: '' };
        let mainDonutChart = null;
        let sheetSyncInterval = null; // Tambahan interval untuk auto-update


        // Konfigurasi Firebase & Inisialisasi
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'jqaf-sk-bukit-kallam';
        const firebaseConfig = typeof __firebase_config !== 'undefined'
            ? JSON.parse(__firebase_config)
            : {
                apiKey: "AIzaSyBYdeHrM0-cV7eeIz18hUHoF4x9EsCkJ0E",
                authDomain: "jqaf-skbk.firebaseapp.com",
                projectId: "jqaf-skbk",
                storageBucket: "jqaf-skbk.firebasestorage.app",
                messagingSenderId: "281645626968",
                appId: "1:281645626968:web:befcc37ceb38fe2d2d7c2d",
                measurementId: "G-PBXH02NG6N"
              };




        // Inisialisasi Aplikasi Firebase (Compat mode)
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();




        // Rujukan Koleksi Firebase mengikut RULE 1
        const getCollectionRef = (collectionName) => {
            return db.collection('artifacts').doc(appId).collection('public').doc('data').collection(collectionName);
        };




        // Mulakan Sesi Autentikasi terlebih dahulu mengikut RULE 3
        async function initAuthAndData() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await auth.signInWithCustomToken(__initial_auth_token);
                }
            } catch (err) {
                console.error("Autentikasi gagal:", err);
            }

            // Selepas disahkan, dengar perubahan data secara Real-Time (onSnapshot)
            setupRealtimeListeners();
        }

        // Dengar Perubahan secara Real-Time daripada Firestore
        function setupRealtimeListeners() {
            // 1. Pengurusan Kelas (Dari Config + Google Sheet)
            getCollectionRef('config').doc('pengurusan').onSnapshot(async (doc) => {
                if (doc.exists) {
                    configPengurusan = doc.data();
                    if (configPengurusan.url) {
                        await fetchSheetData(configPengurusan.url);
                       
                        // Setkan Auto-Update (Tarik data Google Sheet setiap 10 saat)
                        if(sheetSyncInterval) clearInterval(sheetSyncInterval);
                        sheetSyncInterval = setInterval(() => {
                            fetchSheetData(configPengurusan.url);
                        }, 10000);
                    }
                }
                renderMainView();
            }, err => console.error("Gagal mendapatkan config kelas:", err));


            // 2. Status Kelas
            getCollectionRef('statusKelasData').onSnapshot(snapshot => {
                statusKelasData = [];
                snapshot.forEach(doc => {
                    statusKelasData.push({ id: doc.id, ...doc.data() });
                });
                renderMainView();
            }, err => console.error("Gagal mendapatkan status kelas:", err));




            // 3. Data Fokus Tahun 6
            getCollectionRef('dataFokusTahun6').onSnapshot(snapshot => {
                dataFokusTahun6 = [];
                snapshot.forEach(doc => {
                    dataFokusTahun6.push({ id: doc.id, ...doc.data() });
                });
                renderMainView();
            }, err => console.error("Gagal mendapatkan data tahun 6:", err));




            // 4. Hebahan
            getCollectionRef('hebahanList').onSnapshot(snapshot => {
                hebahanList = [];
                snapshot.forEach(doc => {
                    hebahanList.push({ id: doc.id, ...doc.data() });
                });
                renderMainView();
            }, err => console.error("Gagal mendapatkan hebahan:", err));




            // 5. Pelaporan Links
            getCollectionRef('pelaporanLinks').onSnapshot(snapshot => {
                pelaporanLinks = [];
                snapshot.forEach(doc => {
                    pelaporanLinks.push({ id: doc.id, ...doc.data() });
                });
                renderMainView();
            }, err => console.error("Gagal mendapatkan pautan pelaporan:", err));
        }




        function changeView(view) {
            currentView = view;
            renderMainView();
        }




        function toggleAdmin() {
            const panel = document.getElementById('adminPanel');
            panel.classList.toggle('hidden');
            if (!panel.classList.contains('hidden')) {
                if (!isLoggedIn) {
                    renderLogin();
                } else {
                    editingIndex = -1;
                    editingT6Index = -1;
                    renderAdminDashboard();
                }
            }
        }

                    <button onclick="toggleAdmin()" class="block w-full text-gray-400 mt-4 text-sm underline">Batal</button>
                    <p id="passError" class="text-red-500 mt-4 hidden font-bold">Kata laluan salah!</p>
                </div>
            `;
        }

            const pass = document.getElementById('adminPass').value;
            if (pass === 'elmioz1234') {
                isLoggedIn = true;
                editingIndex = -1;
                editingT6Index = -1;
                renderAdminDashboard();
            } else {
                document.getElementById('passError').classList.remove('hidden');

        }

        function fillEditT6Form() {
            const item = dataFokusTahun6[editingT6Index];
            if (!item.kategori || item.kategori === 'tasmik') {
                document.getElementById('cT6FasaTasmik').value = item.fasa || 'FASA 1';
                document.getElementById('cT6JumlahTasmik').value = item.jumlahMurid || '';
                document.getElementById('cT6BilKhatam').value = item.bilKhatam || '';
                document.getElementById('cT6PeratusKhatam').value = item.peratusKhatam || '';
                document.getElementById('cT6BilIqra').value = item.bilIqra || '';
                document.getElementById('cT6PeratusCelikIqra').value = item.peratusCelikIqra || '';
                document.getElementById('cT6BilLemahIqra').value = item.bilLemahIqra || '';
                document.getElementById('cT6PeratusLemahIqra').value = item.peratusLemahIqra || '';
            } else if (item.kategori === 'jawi') {
                document.getElementById('cT6FasaJawi').value = item.fasa || 'FASA 1';
                document.getElementById('cT6JumlahJawi').value = item.jumlahMurid || '';
                document.getElementById('cT6Tp6').value = item.tp6 || '';
                document.getElementById('cT6Tp5').value = item.tp5 || '';
                document.getElementById('cT6Tp4').value = item.tp4 || '';
                document.getElementById('cT6Peratus456').value = item.peratus456 || '';
                document.getElementById('cT6Peratus3').value = item.peratus3 || '';
                document.getElementById('cT6Peratus12').value = item.peratus12 || '';
            } else if (item.kategori === 'solat') {
                document.getElementById('cT6FasaSolat').value = item.fasa || 'FASA 1';
                document.getElementById('cT6JumlahSolat').value = item.jumlahMurid || '';
                document.getElementById('cT6PeratusPerlakuan').value = item.peratusPerlakuan || '';
                document.getElementById('cT6PeratusBacaan').value = item.peratusBacaan || '';
                document.getElementById('cT6PeratusWudhu').value = item.peratusWudhu || '';
            }
        }


        function fillEditForm() {
            const item = statusKelasData[editingIndex];
            document.getElementById('sKelas').value = item.kelas;
            document.getElementById('sBilMurid').value = item.bilMurid;
            document.getElementById('sGuru').value = item.guru || '';

        // Fungsi Tarik Data dari Google Sheet URL
        async function fetchSheetData(url) {
            try {
                const match = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
                if(!match) return;
                const sheetId = match[1];
                // Tambah &headers=0 supaya Google tidak membuang baris pertama sebagai header secara automatik
                const fetchUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&headers=0`;
                const res = await fetch(fetchUrl);
                const text = await res.text();
                // Filter GViz API json wrapping
                const jsonStr = text.substring(47, text.length - 2);
                const json = JSON.parse(jsonStr);


                classes = [];
                // Bermula pada A3 bermaksud index ke-2 dalam tatasusunan (0 = Baris 1, 1 = Baris 2, 2 = Baris 3)
                const dataRows = json.table.rows.slice(2);


                dataRows.forEach(row => {
                    if(row.c && row.c[0] && row.c[0].v) {
                        const name = row.c[0].v.toString().trim();
                        if(name === '') return; // Abaikan jika baris kosong
                       
                        // Ambil nilai Lajur B, jika kosong atau tiada nilai, anggap sebagai 'X'
                        let actionRaw = (row.c[1] && row.c[1].v) ? row.c[1].v.toString().trim().toUpperCase() : 'X';
                       
                        let action = 'BELUM ADA TINDAKAN';
                        if (actionRaw === 'O') action = 'SEDANG DITAKSIR';
                        else if (actionRaw === 'Y') action = 'TELAH DITAKSIR'; // Kemaskini nama status mengikut kehendak
                       
                        classes.push({ name, action });
                    }
                });
               
                // Sort secara Natural (e.g. 1 Bijak, 1 Cerdik, 2 Pintar)
                classes.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true, sensitivity: 'base'}));
               
                // Kemas kini view selepas berjaya mendapatkan data terbaru
                if(currentView === 'Utama') renderMainView();
               
            } catch(e) {
                console.error("Ralat memuat turun dari Google Sheet:", e);
            }
        }

            const found = pelaporanLinks.find(p => p.tahun === tahun && p.label === fasa);
           
            if (found) {
                resultDiv.innerHTML = `
                    <div class="bg-emerald-50 border border-emerald-200 p-6 rounded-xl text-center">
                        <p class="text-emerald-800 font-bold mb-2">Data Ditemui untuk ${tahun} - ${fasa}</p>
                        <a href="${found.url}" target="_blank" class="text-blue-600 font-bold underline text-lg">KLIK UNTUK BUKA DOKUMEN PDF/SHEET</a>
                    </div>
                `;
            } else {
                resultDiv.innerHTML = `<p class="text-red-500 font-bold">Tiada data dijumpai bagi pilihan tersebut.</p>`;
            }
        }


        // Mulakan inisialisasi aplikasi
        window.onload = function() {
            initAuthAndData();
        };
    </script>
</body>
</html>
