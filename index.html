        // Fungsi penapis pintar untuk mengesahkan baris data terisi
        function isRowFilled(rowData) {
            if (!rowData || !Array.isArray(rowData)) return false;

            // Bersihkan setiap sel daripada aksara kosong, dasy, ralat formula
            const cleaned = rowData.map(val => {
                if (val === null || val === undefined) return '';
                let str = String(val).trim();
                if (str === '-' || str === '–' || str === '—' || str === 'null' || str === 'undefined' || str.startsWith('#')) return '';
                return str;
            });

            // Ambil semua sel yang berteks/berisi
            const nonInitialEmpty = cleaned.filter(val => val !== '');
            if (nonInitialEmpty.length === 0) return false;

            // Jika hanya 1 sel terisi dan ia hanya nombor siri (cth: Bil 1, 2, 3...), anggap baris kosong
            if (nonInitialEmpty.length === 1 && !isNaN(nonInitialEmpty[0])) {
                return false;
            }

            // Jika Lajur 0 ada nombor (Bil) dan Lajur 1 (Nama/Kelas) kosong tanpa data lain
            if (cleaned.length > 1 && !isNaN(cleaned[0]) && cleaned[0] !== '' && cleaned[1] === '') {
                const hasDataInRest = cleaned.slice(2).some(v => v !== '' && isNaN(v));
                if (!hasDataInRest) {
                    return false;
                }
            }

            return true;
        }

        async function initAuthAndData() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await auth.signInWithCustomToken(__initial_auth_token);
                } else {
                    await auth.signInAnonymously();
                }
            } catch (err) {
                console.warn("Autentikasi Firebase gagal/luar talian, meneruskan mod aplikasi:", err);
            }

            // Memastikan paparan utama terus dirender walaupun Firebase berada dalam mod luar talian
            renderMainView();
            setupRealtimeListeners();
        }

        function setupRealtimeListeners() {
            getCollectionRef('config').doc('pengurusan').onSnapshot(async (doc) => {
                if (doc.exists) {
                    configPengurusan = doc.data();
                    if (configPengurusan.url) {
                        await fetchSheetData(configPengurusan.url);
                        
                        if(sheetSyncInterval) clearInterval(sheetSyncInterval);
                        sheetSyncInterval = setInterval(() => {
                            fetchSheetData(configPengurusan.url);
                        }, 15000);
                    }
                }
                renderMainView();
            }, err => {
                console.warn("Firestore luar talian / tidak dapat dicapai (pengurusan):", err);
                renderMainView();
            });

            getCollectionRef('dashboardCards').onSnapshot(snapshot => {
                dashboardCards = [];
                snapshot.forEach(doc => {
                    dashboardCards.push({ id: doc.id, ...doc.data() });
                });
                renderMainView();
            }, err => {
                console.warn("Firestore luar talian (dashboardCards):", err);
            });

            getCollectionRef('config').doc('analisisJqaf').onSnapshot(doc => {
                if (doc.exists) {
                    configAnalisis = doc.data();
                    
                    fillAnalisisInputs();

                    ['tasmik', 'jawi', 'solat'].forEach(cat => {
                        ['fasa1', 'fasa2', 'fasa3'].forEach(fasa => {
                            const url = configAnalisis[cat]?.[fasa];
                            if (url) {
                                fetchAnalisisSheetData(cat, fasa, url);
                            }
                        });
                    });

            });

            getCollectionRef('dataFokusTahun6').onSnapshot(snapshot => {

            });

            getCollectionRef('hebahanList').onSnapshot(snapshot => {

                });
                renderMainView();

                console.warn("Firestore luar talian (pelaporanLinks):", err);
            });
        }

        async function fetchAnalisisSheetData(category, fasa, url) {
            if (!url) return;
            try {
                const match = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
                if (!match) return;
                const sheetId = match[1];
                
                const gidMatch = url.match(/gid=([0-9]+)/);
                const gidParam = gidMatch ? `&gid=${gidMatch[1]}` : '';
                
                // Tetapkan julat A1:J8 khusus untuk Data Al-Quran (tasmik)
                const rangeParam = (category === 'tasmik') ? '&range=A1:J8' : '';
                
                const fetchUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&headers=1${gidParam}${rangeParam}`;
                const res = await fetch(fetchUrl);
                const text = await res.text();
                
                const jsonStr = text.substring(47, text.length - 2);
                const json = JSON.parse(jsonStr);

                const headers = [];
                if (json.table.cols) {
                    const cols = (category === 'tasmik') ? json.table.cols.slice(0, 10) : json.table.cols;
                    cols.forEach(col => {
                        headers.push(col.label || '');
                    });
                }

                const rows = [];
                if (json.table.rows) {
                    const sourceRows = (category === 'tasmik') ? json.table.rows.slice(0, 7) : json.table.rows;
                    sourceRows.forEach(row => {
                        const rowData = [];
                        if (row.c) {
                            const cells = (category === 'tasmik') ? row.c.slice(0, 10) : row.c;
                            cells.forEach(cell => {
                                let val = '';
                                if (cell) {
                                    if (cell.f !== undefined && cell.f !== null) {
                                        val = String(cell.f).trim();
                                    } else if (cell.v !== undefined && cell.v !== null) {
                                        val = String(cell.v).trim();
                                    }
                                }
                                rowData.push(val);
                            });
                        }
                        if (isRowFilled(rowData)) {
                            rows.push(rowData);
                        }
                    });
                }

                if (!analisisData[category]) {
                    analisisData[category] = {};
                }
                analisisData[category][fasa] = { headers, rows };

                if (currentView.toLowerCase() === category.toLowerCase()) {
                    renderMainView();
                }
            } catch (e) {
                console.error(`Gagal memproses Google Sheet ${category} - ${fasa}:`, e);
            }
        }

        async function fetchSheetData(url) {
            try {
                const match = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
                if(!match) return;
                const sheetId = match[1];
                const fetchUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&headers=0`;
                const res = await fetch(fetchUrl);
                const text = await res.text();
                const jsonStr = text.substring(47, text.length - 2);
                const json = JSON.parse(jsonStr);

                classes = [];
                const dataRows = json.table.rows.slice(2);

                dataRows.forEach(row => {
                    if(row.c) {
                        let actionRaw = (row.c[1] && row.c[1].v) ? row.c[1].v.toString().trim().toUpperCase() : ((row.c[0] && row.c[0].v) ? row.c[0].v.toString().trim().toUpperCase() : '');
                        if (!actionRaw) return;
                        
                        let action = 'BELUM ADA TINDAKAN';
                        if (actionRaw === 'O') action = 'SEDANG DITAKSIR';
                        else if (actionRaw === 'Y') action = 'TELAH DITAKSIR'; 
                        
                        classes.push({ action });
                    }
                });
                
                if(currentView === 'Utama') renderMainView();
                
            } catch(e) {
                console.error("Ralat memuat turun dari Google Sheet:", e);
            }
        }

        async function saveDashboardCard() {
            const tajuk = document.getElementById('dbCardTitle').value.trim();
            const nilai = document.getElementById('dbCardValue').value.trim();
            const keterangan = document.getElementById('dbCardSub').value.trim();

            if (!tajuk || !nilai) return;

            const data = {
                tajuk: tajuk,
                nilai: nilai,
                keterangan: keterangan,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                if (editingDashboardCardId) {
                    await getCollectionRef('dashboardCards').doc(editingDashboardCardId).update(data);
                    editingDashboardCardId = null;
                } else {
                    await getCollectionRef('dashboardCards').add(data);
                }
                renderAdminDashboard();
            } catch (err) {
                console.error("Ralat menyimpan kad dashboard:", err);
            }
        }

        function fillAnalisisInputs() {
            ['tasmik', 'jawi', 'solat'].forEach(cat => {
                ['fasa1', 'fasa2', 'fasa3'].forEach(fasa => {
                    const id = `url${cat.charAt(0).toUpperCase() + cat.slice(1)}${fasa.charAt(0).toUpperCase() + fasa.slice(1)}`;
                    const el = document.getElementById(id);
                    if (el) {
                        el.value = configAnalisis[cat]?.[fasa] || '';
                    }
                });
            });
        }

        async function saveAnalisisUrl(category, fasa) {
            const id = `url${category.charAt(0).toUpperCase() + category.slice(1)}${fasa.charAt(0).toUpperCase() + fasa.slice(1)}`;
            const inputVal = document.getElementById(id).value.trim();
            
            if (!configAnalisis[category]) configAnalisis[category] = {};
            configAnalisis[category][fasa] = inputVal;

            try {
                await getCollectionRef('config').doc('analisisJqaf').set(configAnalisis, { merge: true });
                const btn = document.querySelector(`button[onclick="saveAnalisisUrl('${category}', '${fasa}')"]`);
                if (btn) {
                    const originalText = btn.innerText;
                    btn.innerText = "Berjaya!";
                    btn.classList.add("bg-emerald-500");
                    setTimeout(() => {
                        btn.innerText = originalText;
                        btn.classList.remove("bg-emerald-500");
                    }, 2000);
                }
            } catch (err) {
                console.error("Gagal menyimpan pautan URL analisis:", err);
            }
        }

        async function deleteEntry(type, index) {
            let docId = '';
            let collectionName = '';

            if(type === 'classes') {
                docId = classes[index].id;
                collectionName = 'classes';
            } else if(type === 'statusData') {
                docId = statusKelasData[index].id;
                collectionName = 'statusKelasData';
            } else if(type === 'hebahanList') {
                docId = hebahanList[index].id;
                collectionName = 'hebahanList';
            } else if(type === 'tahun6') {
                docId = dataFokusTahun6[index].id;
                collectionName = 'dataFokusTahun6';
            } else if(type === 'pelaporan') {
                docId = pelaporanLinks[index].id;
                collectionName = 'pelaporanLinks';
            } else if(type === 'dashboardCards') {
                docId = dashboardCards[index].id;
                collectionName = 'dashboardCards';
            }

            if(docId && collectionName) {
                try {
                    await getCollectionRef(collectionName).doc(docId).delete();
                    renderAdminDashboard();
                } catch (err) {
                    console.error("Gagal memadam data:", err);
                }
            }
        }

        function renderDashboardCardsHtml() {
            const defaultCards = [
                { tajuk: "Peratus Khatam Al-Quran", nilai: "0%", keterangan: "Maklumat Fasa Terkini", color: "emerald", icon: "📖" },
                { tajuk: "Peratus Celik Al-Quran", nilai: "0%", keterangan: "Maklumat Fasa Terkini", color: "blue", icon: "✨" },

            ];

            const cardsToDisplay = dashboardCards.length > 0 ? dashboardCards : defaultCards;

            const colorClasses = {
                emerald: { border: 'border-l-emerald-500', text: 'text-emerald-600', bg: 'bg-emerald-50' },
                blue: { border: 'border-l-blue-500', text: 'text-blue-600', bg: 'bg-blue-50' },

                    palette = colorClasses.blue;

                    defaultIcon = "✍️";

                    defaultIcon = "✨";

                    palette = colorClasses.purple;
                    defaultIcon = "✍️";

            } else if (currentView === 'Tahun6') {
                mainTitle.innerText = "DATA FOKUS TAHUN 6";
                container.className = "flex flex-col gap-6";

                const isAlquran = selectedAnalisisT6Cat === 'alquran' || selectedAnalisisT6Cat === 'tasmik';
                const isJawi = selectedAnalisisT6Cat === 'jawi';
                const isSolat = selectedAnalisisT6Cat === 'solat';

                const btnActive = "bg-indigo-600 text-white shadow-md font-bold ring-2 ring-indigo-300";
                const btnInactive = "bg-white text-slate-700 hover:bg-slate-100 border border-slate-200 font-semibold";

                const renderTable = (fasa, kategori, rows) => {
                    const d = dataFokusTahun6.find(x => (x.kategori || 'tasmik') === kategori && x.fasa === fasa) || {};
                    return `
                    <div class="bg-slate-50/50 p-5 rounded-2xl border border-slate-200 shadow-sm flex-1">
                        <h4 class="font-black text-sm text-center text-indigo-900 bg-indigo-100/70 py-2 rounded-lg mb-4 uppercase tracking-wider">${fasa}</h4>
                        <table class="w-full text-xs text-left">
                            <tbody class="divide-y divide-slate-100">
                                <tr><td class="py-2 font-semibold text-slate-700">Jumlah Murid</td><td class="py-2 text-right font-bold text-slate-900">${d.jumlahMurid || '-'}</td></tr>
                                ${rows.map(r => `
                                    <tr>
                                        <td class="py-2 text-slate-600 font-medium">${r.label}</td>
                                        <td class="py-2 text-right font-bold text-indigo-600">${d[r.key] || '-'}${r.isPct && d[r.key] && !String(d[r.key]).includes('%') ? '%' : ''}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>`;
                };

                const tasmikRows = [
                    {label: 'Bil. Khatam', key: 'bilKhatam'}, {label: 'Peratus Khatam', key: 'peratusKhatam', isPct: true},
                    {label: 'Bil. Alquran', key: 'bilAlquran'}, {label: 'Peratus Alquran', key: 'peratusAlquran', isPct: true},
                    {label: 'Bil. Iqra', key: 'bilIqra'}, {label: 'Peratus Celik Iqra', key: 'peratusCelikIqra', isPct: true},
                    {label: 'Bil. Lemah Iqra', key: 'bilLemahIqra'}, {label: 'Peratus Lemah Iqra', key: 'peratusLemahIqra', isPct: true}
                ];
                const jawiRows = [
                    {label: 'Bilangan TP 6', key: 'tp6'}, {label: 'Bilangan TP 5', key: 'tp5'}, {label: 'Bilangan TP 4', key: 'tp4'},
                    {label: 'Bilangan TP 3', key: 'tp3'}, {label: 'Bilangan TP 2', key: 'tp2'}, {label: 'Bilangan TP 1', key: 'tp1'},
                    {label: 'Peratus TP 4,5 & 6', key: 'peratus456', isPct: true}, {label: 'Peratus TP 3', key: 'peratus3', isPct: true}, {label: 'Peratus TP 1 & 2', key: 'peratus12', isPct: true}
                ];
                const solatRows = [
                    {label: 'Peratus Perlakuan', key: 'peratusPerlakuan', isPct: true},
                    {label: 'Peratus Bacaan', key: 'peratusBacaan', isPct: true},
                    {label: 'Peratus Wudhu', key: 'peratusWudhu', isPct: true}
                ];

                const catKey = isAlquran ? 'tasmik' : (isJawi ? 'jawi' : 'solat');
                const catName = isAlquran ? 'AL-QURAN' : (isJawi ? 'JAWI' : 'SOLAT');
                const currentRows = isAlquran ? tasmikRows : (isJawi ? jawiRows : solatRows);

                container.innerHTML = `
                    <div class="bg-gradient-to-r from-indigo-900 to-purple-900 text-white p-6 rounded-2xl shadow-md">
                        <h3 class="text-lg font-bold">DATA FOKUS TAHUN 6</h3>
                        <p class="text-xs text-indigo-200 mt-1">Maklumat dan perincian data statistik murid Tahun 6 mengikut Fasa berdasarkan kategori yang dipilih.</p>
                    </div>

                    <!-- 3 KAD DASHBOARD DI ATAS BUTANG PILIHAN KATEGORI -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        ${renderDashboardCardsHtml()}
                    </div>

                    <!-- BUTANG PILIHAN: ALQURAN - JAWI - SOLAT -->
                    <div class="flex flex-wrap justify-center gap-3 bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                        <button onclick="setAnalisisT6Cat('alquran')" class="px-6 py-2.5 rounded-xl text-xs tracking-wider uppercase transition duration-200 ${isAlquran ? btnActive : btnInactive}">
                            📖 AL-QURAN
                        </button>
                        <button onclick="setAnalisisT6Cat('jawi')" class="px-6 py-2.5 rounded-xl text-xs tracking-wider uppercase transition duration-200 ${isJawi ? btnActive : btnInactive}">
                            ✍️ JAWI
                        </button>
                        <button onclick="setAnalisisT6Cat('solat')" class="px-6 py-2.5 rounded-xl text-xs tracking-wider uppercase transition duration-200 ${isSolat ? btnActive : btnInactive}">
                            🕌 SOLAT
                        </button>
                    </div>

                    <!-- PAPARAN DATA FOKUS MENGIKUT KATEGORI TERPILIH -->
                    <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                        <h3 class="text-sm font-black text-indigo-900 uppercase tracking-widest mb-4 border-b pb-3 flex items-center justify-between">
                            <span>DATA FOKUS: ${catName}</span>
                            <span class="text-xs font-semibold text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full uppercase">3 FASA</span>
                        </h3>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            ${renderTable('FASA 1', catKey, currentRows)}
                            ${renderTable('FASA 2', catKey, currentRows)}
                            ${renderTable('FASA 3', catKey, currentRows)}
                        </div>
                    </div>
                `;
            } else {
                const category = currentView.toLowerCase();
                mainTitle.innerText = currentView === 'Tasmik' ? "DATA ALQURAN" : (currentView === 'Jawi' ? "DATA JAWI" : "DATA SOLAT");
                container.className = "flex flex-col gap-6";
                
                container.innerHTML = `
                    ${renderAnalisisTable(category, 'fasa1', 'FASA 1')}
                    ${renderAnalisisTable(category, 'fasa2', 'FASA 2')}
                    ${renderAnalisisTable(category, 'fasa3', 'FASA 3')}
                `;
            }
        }

        function searchPdfLink() {
            const tahun = document.getElementById('searchTahun').value;
            const fasa = document.getElementById('searchFasa').value;
            const resultDiv = document.getElementById('searchResult');
            
            const found = pelaporanLinks.find(p => p.tahun === tahun && p.label === fasa);
            
            if (found) {
                resultDiv.innerHTML = `
                    <div class="bg-emerald-50 border border-emerald-200 p-6 rounded-xl text-center">
                        <p class="text-emerald-800 font-bold mb-2">Data Ditemui untuk ${tahun} - ${fasa}</p>
                        <a href="${found.url}" target="_blank" class="text-blue-600 font-bold underline text-lg">KLIK UNTUK BUKA DOKUMEN PDF/SHEET</a>
                    </div>
                `;
            } else {
                resultDiv.innerHTML = `<p class="text-red-500 font-bold">Tiada data dijumpai bagi pilihan tersebut.</p>`;
            }
        }

        window.onload = function() {
            initAuthAndData();
        };
    </script>
</body>
</html>
